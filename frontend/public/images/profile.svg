  <path d="M 305 150 C 305 150 315 140 323 140 C 332 140 338 146 338 155 C 338 170 315 190 305 200 C 295 190 272 170 272 155 C 272 146 278 140 287 140 C 295 140 305 150 305 150" fill="#FF6B9D" opacity="0.7"/>
  
  <!-- Info boxes -->
